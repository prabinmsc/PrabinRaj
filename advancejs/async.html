<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Data Table</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        text-align: center;
      }
      table,
      th,
      td {
        border: 1px solid black;
      }
      h1{
        text-align: center;
      }
      th,
      td {
        padding: 10px;
        text-align: left;
      }
      #delete , .cancel-btn {
        background-color: rgba(249, 16, 16, 0.573);
        padding: 5px 8px;
        border: none;
        border-radius: 5px;
        color: white;
      }

      #edit ,.submit-btn {
        background-color: rgb(25, 129, 241);
        padding: 5px 8px;
        border: none;
        border-radius: 5px;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>Fetched Data from API</h1>

    <table id="data-table">
      <thead>
        <tr>
          <th>Id</th>
          <th>Title</th>
          <th>Body</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      async function fetchData() {
        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/posts"
          );

          const data = await response.json();

          populateTable(data);
        } catch (error) {
          console.error("Error fetching data:", error);
        }
      }

      function populateTable(data) {
        const tableBody = document.getElementsByTagName("tbody");
        data.forEach((item) => {
          const row = document.createElement("tr");
          row.innerHTML = `<td>${item.id}</td>
                     <td>${item.title}</td>
                     <td>${item.body}</td>
                     <td><button id="edit" onclick="edit(this)">Edit</button></td>
                     <td><button id="delete" onclick="del(this)">❌Delete</button></td>
                     `;
          document.querySelector("tbody").appendChild(row);
        });
      }

      function edit(btn) {
        const row = btn.parentElement.parentElement;
        const titleCell = row.cells[1];
        const bodyCell = row.cells[2];
        const currentValue1 = titleCell.textContent;
        const currentValue2 = bodyCell.textContent;
        titleCell.innerHTML = `
        <input type="text" value="${currentValue1}" />
        <div class = "action-btn">
            <button class ="submit-btn">✅submit</button>
            <button class="cancel-btn">❌cancel</button>
        </div>`

        const inputFld = titleCell.querySelector('input');
        const submitBtn = titleCell.querySelector('.submit-btn');
        const cancelBtn = titleCell.querySelector('.cancel-btn');

        submitBtn.addEventListener('click', ()=> {
            const newId = inputFld.value;
            titleCell.textContent=newId;
        });

        cancelBtn.addEventListener('click', ()=> {
            // const newId = inputFld.value;
            titleCell.textContent=currentValue1;
        });

    bodyCell.innerHTML = `
    <input type="text" value="${currentValue2}" />
    <div class="action-btn">
        <button class="submit-btn">✅submit</button>
        <button class="cancel-btn">❌cancel</button>
    </div>`;

    const inputBodyFld = bodyCell.querySelector('input');
    const submitBodyBtn = bodyCell.querySelector('.submit-btn');
    const cancelBodyBtn = bodyCell.querySelector('.cancel-btn');

    submitBodyBtn.addEventListener('click', () => {
        const newBody = inputBodyFld.value;
        bodyCell.textContent = newBody;
    });

    cancelBodyBtn.addEventListener('click', () => {
        bodyCell.textContent = currentValue2;
    });
      }

      function del(btn) {
        let row = btn.parentElement.parentElement;
        row.remove();
      }

      fetchData();
    </script>
  </body>
</html>
