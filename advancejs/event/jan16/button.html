<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>
</head>
<body>
    <form action="">
        <label>Select Your Gender</label>
        <input type="radio" class="one" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" class="one" name="gender" value="Female">
        <label for="female">Female</label>
        <input type="radio" class="one" name="gender" value="Others">
        <label for="others">Others</label>
        <button onclick="sub(event)">submit</button>
    </form>
    <p id="out"></p>
    
</body>
<script>
//    it is used to prevent / show permanently the button value in console or in output
// otherwise it will blink the value.
    function sub(e){
        e.preventDefault()
        var a=document.getElementsByClassName("one")
        let b=document.createElement("p")
        let c=document.getElementById("out")

        
        for(let i=0;i<a.length;i++){
           
            if(a[i].checked==true){
                console.log(a[i].value)
                b.innerHTML=a[i].value
                c.append(b)
            }
        
        }
        
       
       
        

    }
</script>
</html>
