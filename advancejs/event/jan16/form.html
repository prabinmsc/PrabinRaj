<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="name">Name: </label>
        <input type="text" id="name" >
        <br><br>
        <label for="mail">E-Mail: </label>
        <input type="email" id="mail" >
        <br><br>
        <label for="pass">Password: </label>
        <input type="password" id="pass" >
        <br><br>
        <label for="num">Number: </label>
        <input type="number" id="num" >
        <br><br>
        <label for="gen">Gender: </label>
        <input type="radio" class="male" name="gender">
        <label for="male">Male</label>
        <input type="radio" class="female" name="gender">
        <label for="female">Female</label>
        <input type="radio" class="others" name="gender">
        <label for="others">Others</label>
        <br><br>
        <label>Skills: </label>
        <input type="checkbox" class="Javascript" name="skills" value="">
        <label for="javascript">Javascript</label>
        <input type="checkbox" class="css" name="skills" value="">
        <label for="css">css</label>
        <input type="checkbox" class="html" name="skills" value="">
        <label for="html">Html</label>
        <br><br>
        <label for="country">Country:</label>
        <select name="cars" id="cars">
             <option value="volvo">Volvo</option>
             <option value="saab">Saab</option>
             <option value="mercedes">Mercedes</option>
             <option value="audi">Audi</option>
        </select>
               
        
    </form>
</body>
</html>
