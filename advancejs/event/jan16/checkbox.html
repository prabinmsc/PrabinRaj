<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom</title>
</head>
<body>
    <form action="">
        <label>Select Your course</label>
        <input type="checkbox" class="one"  value="html">
        <label >html</label>
        <input type="checkbox" class="one" value="css">
        <label >class</label>
        <input type="checkbox" class="one"  value="javascript">
        <label >javascript</label>
        <input type="checkbox" class="one"  value="reactjs">
        <label >reactjs</label>
        <button onclick="sub(event)">submit</button>
        <ul id="list" >
        </ul>
    </form>
   
    
</body>
<script>
   
    function sub(e){
        e.preventDefault()
        var a=document.getElementsByClassName("one")
        var list=document.getElementById("list")
       
        
        for(let i=0;i<a.length;i++){
           
            if(a[i].checked==true){
                // console.log(a[i].value)
                var b=document.createElement("li")
                b.innerHTML=a[i].value
                list.append(b)

            }
        }
        
       

    }
</script>
</html>
